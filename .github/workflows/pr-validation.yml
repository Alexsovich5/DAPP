# Pull Request Validation
# Fast validation for PRs to ensure code quality before merge

name: PR Validation

on:
  pull_request:
    branches: [main, development]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  quick-validation:
    name: Quick Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need base commit for comparison

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: angular-frontend/package-lock.json

      - name: Install Python dependencies (minimal)
        run: |
          cd python-backend
          python -m pip install --upgrade pip
          pip install black flake8 mypy bandit

      - name: Install Node dependencies
        run: |
          cd angular-frontend
          npm ci

      - name: Python formatting check
        run: |
          cd python-backend
          black --check --diff app/ || echo "⚠️ Python formatting issues found"

      - name: Python linting (errors only)
        run: |
          cd python-backend
          flake8 app/ --select=E9,F63,F7,F82 --show-source --statistics

      - name: Python security scan (quick)
        run: |
          cd python-backend
          bandit -r app/ -ll || echo "⚠️ Security issues found"

      - name: Angular linting (errors only)
        run: |
          cd angular-frontend
          npx nx lint --quiet || echo "⚠️ Angular linting issues found"

      - name: TypeScript compilation check
        run: |
          cd angular-frontend
          npx tsc --noEmit --skipLibCheck

      - name: Build check
        run: |
          cd angular-frontend
          npx nx build --configuration=production

      - name: PR Summary
        run: |
          echo "## 🔍 PR Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Quick validation completed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed:" >> $GITHUB_STEP_SUMMARY
          echo "- Python code formatting (Black)" >> $GITHUB_STEP_SUMMARY
          echo "- Python linting (Flake8 - errors only)" >> $GITHUB_STEP_SUMMARY
          echo "- Python security scan (Bandit)" >> $GITHUB_STEP_SUMMARY
          echo "- Angular linting (errors only)" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript compilation" >> $GITHUB_STEP_SUMMARY
          echo "- Production build test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Full test suite will run after merge approval**" >> $GITHUB_STEP_SUMMARY

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Python dependencies
        run: |
          cd python-backend
          pip install safety
          safety check --json --output safety-report.json || echo "⚠️ Security vulnerabilities found in dependencies"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check Node dependencies
        run: |
          cd angular-frontend
          npm audit --audit-level=high || echo "⚠️ High severity vulnerabilities found in npm dependencies"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-security-reports
          path: |
            python-backend/safety-report.json

  file-changes-analysis:
    name: Analyze File Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze changed files
        run: |
          echo "## 📁 File Changes Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get changed files
          git diff --name-only HEAD^ HEAD > changed_files.txt
          
          # Count changes by type
          python_changes=$(grep -E '\.(py)$' changed_files.txt | wc -l || echo 0)
          ts_changes=$(grep -E '\.(ts|html|scss)$' changed_files.txt | wc -l || echo 0)
          config_changes=$(grep -E '\.(json|yml|yaml|toml|ini)$' changed_files.txt | wc -l || echo 0)
          
          echo "### Changed Files:" >> $GITHUB_STEP_SUMMARY
          echo "- Python files: $python_changes" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript/Angular files: $ts_changes" >> $GITHUB_STEP_SUMMARY
          echo "- Configuration files: $config_changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for critical file changes
          if grep -q -E "(alembic/versions/|requirements\.txt|package\.json)" changed_files.txt; then
            echo "⚠️ **Critical files changed - requires thorough review**" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check for test file changes
          if grep -q -E "(test_|\.spec\.)" changed_files.txt; then
            echo "✅ **Test files updated**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **No test files changed - consider adding tests**" >> $GITHUB_STEP_SUMMARY
          fi

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          # Count lines changed
          lines_added=$(git diff --numstat HEAD^ HEAD | awk '{added += $1} END {print added+0}')
          lines_deleted=$(git diff --numstat HEAD^ HEAD | awk '{deleted += $2} END {print deleted+0}')
          total_changes=$((lines_added + lines_deleted))
          
          echo "## 📊 PR Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lines added: $lines_added" >> $GITHUB_STEP_SUMMARY
          echo "- Lines deleted: $lines_deleted" >> $GITHUB_STEP_SUMMARY
          echo "- Total changes: $total_changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Provide size guidance
          if [ $total_changes -lt 100 ]; then
            echo "✅ **Small PR** - Easy to review" >> $GITHUB_STEP_SUMMARY
          elif [ $total_changes -lt 300 ]; then
            echo "📝 **Medium PR** - Manageable size" >> $GITHUB_STEP_SUMMARY
          elif [ $total_changes -lt 500 ]; then
            echo "⚠️ **Large PR** - Consider breaking into smaller PRs" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚨 **Very Large PR** - Strongly consider breaking into smaller, focused PRs" >> $GITHUB_STEP_SUMMARY
          fi

  notify-pr-status:
    name: PR Status Summary
    runs-on: ubuntu-latest
    needs: [quick-validation, dependency-check, file-changes-analysis, pr-size-check]
    if: always()

    steps:
      - name: Determine PR status
        id: pr-status
        run: |
          validation_status="${{ needs.quick-validation.result }}"
          dependency_status="${{ needs.dependency-check.result }}"
          
          if [[ "$validation_status" == "success" && "$dependency_status" == "success" ]]; then
            echo "status=✅ Ready for Review" >> $GITHUB_OUTPUT
            echo "color=28a745" >> $GITHUB_OUTPUT
          elif [[ "$validation_status" == "success" ]]; then
            echo "status=⚠️ Minor Issues Found" >> $GITHUB_OUTPUT
            echo "color=ffc107" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Issues Need Fixing" >> $GITHUB_OUTPUT
            echo "color=dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Create PR summary
        run: |
          echo "## 🎯 Soul Before Skin PR Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status: ${{ steps.pr-status.outputs.status }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validation Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Quick Validation: ${{ needs.quick-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Check: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- File Analysis: ${{ needs.file-changes-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Size Check: ${{ needs.pr-size-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.pr-status.outputs.status }}" == *"Ready"* ]]; then
            echo "1. ✅ Code review can proceed" >> $GITHUB_STEP_SUMMARY
            echo "2. ✅ Full test suite will run on merge" >> $GITHUB_STEP_SUMMARY
          else
            echo "1. 🔧 Fix identified issues" >> $GITHUB_STEP_SUMMARY
            echo "2. 🔄 Push updates to trigger re-validation" >> $GITHUB_STEP_SUMMARY
          fi