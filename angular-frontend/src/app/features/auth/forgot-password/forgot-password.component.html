<div class="container">
    <mat-card class="forgot-password-card">
        <mat-card-header>
            <mat-card-title>Reset Password</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <p class="form-description">
                Enter your email address, and we'll send you instructions to reset your password.
            </p>
            <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
                <label class="auth-field">
                    <span class="auth-field__label">Email</span>
                    <input
                        dfInput
                        type="email"
                        placeholder="Your email address"
                        formControlName="email">
                    <span
                        class="auth-field__error"
                        *ngIf="forgotPasswordForm.get('email')?.touched && forgotPasswordForm.get('email')?.errors?.['required']">
                        Email is required
                    </span>
                    <span
                        class="auth-field__error"
                        *ngIf="forgotPasswordForm.get('email')?.touched && forgotPasswordForm.get('email')?.errors?.['email']">
                        Please enter a valid email address
                    </span>
                </label>

                <div *ngIf="error" class="error-message">
                    {{ error }}
                </div>

                <div *ngIf="successMessage" class="success-message">
                    {{ successMessage }}
                </div>

                <div class="actions">
                    <button
                        dfButton
                        variant="primary"
                        size="md"
                        type="submit"
                        [disabled]="forgotPasswordForm.invalid || isLoading">
                        <mat-spinner *ngIf="isLoading" diameter="20" class="spinner"></mat-spinner>
                        <span *ngIf="!isLoading">Reset Password</span>
                    </button>
                    <a
                        dfButton
                        variant="ghost"
                        size="md"
                        routerLink="/login">Back to Login</a>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
