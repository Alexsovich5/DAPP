<div class="login-container">
  <mat-card>
    <mat-card-content>
      <div class="header">
        <mat-icon class="avatar-icon">lock</mat-icon>
        <h1>Sign In</h1>
      </div>

      <div *ngIf="error" class="auth__error" role="alert">
        <mat-icon aria-hidden="true">error</mat-icon>
        <span class="auth__error-text">{{ error }}</span>
        <button
          type="button"
          dfButton
          variant="ghost"
          size="sm"
          class="auth__error-close"
          aria-label="Dismiss error"
          (click)="error = null">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <label class="auth-field">
          <span class="auth-field__label">Email Address</span>
          <input
            dfInput
            formControlName="email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required>
          <span
            class="auth-field__error"
            *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">
            Email is required
          </span>
          <span
            class="auth-field__error"
            *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">
            Please enter a valid email address
          </span>
        </label>

        <label class="auth-field">
          <span class="auth-field__label">Password</span>
          <span class="auth-field__control">
            <input
              dfInput
              formControlName="password"
              [type]="hidePassword ? 'password' : 'text'"
              autocomplete="current-password"
              placeholder="Your password"
              required>
            <button
              type="button"
              class="auth-field__toggle"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
              [attr.aria-pressed]="!hidePassword">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </span>
          <span
            class="auth-field__error"
            *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">
            Password is required
          </span>
          <span
            class="auth-field__error"
            *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('minlength')">
            Password must be at least 6 characters
          </span>
        </label>

        <div class="form-actions">
          <mat-checkbox formControlName="rememberMe" color="primary">
            Remember me
          </mat-checkbox>
          <button
            type="button"
            dfButton
            variant="ghost"
            size="sm"
            (click)="navigateToForgotPassword()">
            Forgot password?
          </button>
        </div>

        <button
          dfButton
          variant="primary"
          size="md"
          type="submit"
          class="submit-button"
          [disabled]="loginForm.invalid || isLoading">
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span *ngIf="!isLoading">Sign In</span>
        </button>

        <mat-divider class="divider"></mat-divider>

        <div class="social-buttons">
          <button
            type="button"
            dfButton
            variant="secondary"
            size="md"
            class="google-btn"
            (click)="loginWithGoogle()">
            <mat-icon>account_circle</mat-icon>
            Google
          </button>
          <button
            type="button"
            dfButton
            variant="secondary"
            size="md"
            class="facebook-btn"
            (click)="loginWithFacebook()">
            <mat-icon>share</mat-icon>
            Facebook
          </button>
        </div>

        <div class="register-prompt">
          <span>Don't have an account yet?</span>
          <button
            type="button"
            dfButton
            variant="ghost"
            size="sm"
            (click)="navigateToRegister()">
            Create one now
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <div class="footer">
    <p>&copy; {{currentYear}} Dinner First. All rights reserved.</p>
  </div>
</div>
