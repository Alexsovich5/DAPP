# Kong API Gateway Configuration - Sprint 8 Enhanced Microservices Architecture
# High-performance API gateway with plugins for authentication, rate limiting, monitoring, and security

version: '3.8'

services:
  # PostgreSQL database for Kong
  kong-database:
    image: postgres:15-alpine
    container_name: dinner-first-kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    networks:
      - dinner-first-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Kong database initialization
  kong-migrations:
    image: kong:3.4
    container_name: dinner-first-kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - dinner-first-network
    restart: "no"

  # Kong API Gateway
  kong-gateway:
    image: kong:3.4
    container_name: dinner-first-kong-gateway
    environment:
      # Database Configuration
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}

      # Network Configuration
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: '0.0.0.0:8001'
      KONG_ADMIN_GUI_LISTEN: '0.0.0.0:8002'
      KONG_PROXY_LISTEN: '0.0.0.0:8000, 0.0.0.0:8443 ssl'

      # Performance Settings
      KONG_WORKER_PROCESSES: auto
      KONG_WORKER_CONNECTIONS: 1024
      KONG_PROXY_BUFFER_SIZE: 128k
      KONG_PROXY_BUFFERS: 16 64k

      # Security
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: 'on'
      KONG_TRUSTED_IPS: '0.0.0.0/0,::/0'

      # Logging
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: bundled,prometheus,correlation-id,rate-limiting-advanced,jwt,cors,request-transformer-advanced,response-transformer-advanced

      # Admin API Security
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_ADMIN_GUI_API_URL: http://localhost:8001

    ports:
      - "8000:8000"  # Proxy HTTP
      - "8443:8443"  # Proxy HTTPS
      - "8001:8001"  # Admin API
      - "8002:8002"  # Admin GUI
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    networks:
      - dinner-first-network
    volumes:
      - kong_data:/usr/local/kong
      - ./kong-custom-plugins:/usr/local/share/lua/5.1/kong/plugins/custom
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2GB
          cpus: '1.0'
        reservations:
          memory: 1GB
          cpus: '0.5'

  # Kong Admin API Configuration Tool
  kong-config:
    image: kong:3.4
    container_name: dinner-first-kong-config
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        # Wait for Kong to be ready
        until curl -f http://kong-gateway:8001/status; do
          echo "Waiting for Kong to be ready..."
          sleep 5
        done

        echo "Configuring Kong services and routes..."

        # Configure Auth Service
        curl -X POST http://kong-gateway:8001/services \
          -d "name=auth-service" \
          -d "url=http://auth-service:8000" \
          -d "retries=5" \
          -d "connect_timeout=60000" \
          -d "write_timeout=60000" \
          -d "read_timeout=60000"

        curl -X POST http://kong-gateway:8001/services/auth-service/routes \
          -d "name=auth-routes" \
          -d "paths[]=/api/v1/auth" \
          -d "methods[]=GET" \
          -d "methods[]=POST" \
          -d "methods[]=PUT" \
          -d "methods[]=DELETE"

        # Configure AI Matching Service
        curl -X POST http://kong-gateway:8001/services \
          -d "name=ai-matching-service" \
          -d "url=http://matching-service:8000" \
          -d "retries=3" \
          -d "connect_timeout=30000" \
          -d "write_timeout=30000" \
          -d "read_timeout=30000"

        curl -X POST http://kong-gateway:8001/services/ai-matching-service/routes \
          -d "name=matching-routes" \
          -d "paths[]=/api/v1/matching" \
          -d "paths[]=/api/v1/ai-matching" \
          -d "methods[]=GET" \
          -d "methods[]=POST"

        # Configure Sentiment Analysis Service
        curl -X POST http://kong-gateway:8001/services \
          -d "name=sentiment-service" \
          -d "url=http://sentiment-service:8000" \
          -d "retries=3" \
          -d "connect_timeout=15000" \
          -d "write_timeout=15000" \
          -d "read_timeout=15000"

        curl -X POST http://kong-gateway:8001/services/sentiment-service/routes \
          -d "name=sentiment-routes" \
          -d "paths[]=/api/v1/sentiment" \
          -d "methods[]=GET" \
          -d "methods[]=POST"

        # Configure Messaging Service
        curl -X POST http://kong-gateway:8001/services \
          -d "name=messaging-service" \
          -d "url=http://messaging-service:8000" \
          -d "retries=5" \
          -d "connect_timeout=30000" \
          -d "write_timeout=30000" \
          -d "read_timeout=30000"

        curl -X POST http://kong-gateway:8001/services/messaging-service/routes \
          -d "name=messaging-routes" \
          -d "paths[]=/api/v1/messages" \
          -d "paths[]=/api/v1/chat" \
          -d "methods[]=GET" \
          -d "methods[]=POST" \
          -d "methods[]=PUT" \
          -d "methods[]=DELETE"

        # Configure Profile Service
        curl -X POST http://kong-gateway:8001/services \
          -d "name=profile-service" \
          -d "url=http://profile-service:8000" \
          -d "retries=5" \
          -d "connect_timeout=30000" \
          -d "write_timeout=30000" \
          -d "read_timeout=30000"

        curl -X POST http://kong-gateway:8001/services/profile-service/routes \
          -d "name=profile-routes" \
          -d "paths[]=/api/v1/profiles" \
          -d "paths[]=/api/v1/users" \
          -d "methods[]=GET" \
          -d "methods[]=POST" \
          -d "methods[]=PUT" \
          -d "methods[]=DELETE"

        echo "Configuring Kong plugins..."

        # Global CORS Plugin
        curl -X POST http://kong-gateway:8001/plugins \
          -d "name=cors" \
          -d "config.origins=http://localhost:4200,http://localhost:5001,https://dinner-first.app" \
          -d "config.methods=GET,POST,PUT,DELETE,OPTIONS" \
          -d "config.headers=Accept,Accept-Version,Content-Length,Content-MD5,Content-Type,Date,Authorization,X-Auth-Token" \
          -d "config.exposed_headers=X-Auth-Token" \
          -d "config.credentials=true" \
          -d "config.max_age=3600"

        # Global Correlation ID Plugin
        curl -X POST http://kong-gateway:8001/plugins \
          -d "name=correlation-id" \
          -d "config.header_name=X-Request-ID" \
          -d "config.generator=uuid" \
          -d "config.echo_downstream=true"

        # Global Prometheus Plugin
        curl -X POST http://kong-gateway:8001/plugins \
          -d "name=prometheus" \
          -d "config.per_consumer=true" \
          -d "config.status_code_metrics=true" \
          -d "config.latency_metrics=true" \
          -d "config.bandwidth_metrics=true"

        # Auth Service Rate Limiting
        curl -X POST http://kong-gateway:8001/services/auth-service/plugins \
          -d "name=rate-limiting-advanced" \
          -d "config.limit[]=100" \
          -d "config.window_size[]=60" \
          -d "config.identifier=consumer" \
          -d "config.sync_rate=5" \
          -d "config.strategy=redis" \
          -d "config.redis_host=redis-node-1" \
          -d "config.redis_port=6379" \
          -d "config.redis_password=${REDIS_PASSWORD}"

        # AI Matching Service Rate Limiting (lower limits due to computational cost)
        curl -X POST http://kong-gateway:8001/services/ai-matching-service/plugins \
          -d "name=rate-limiting-advanced" \
          -d "config.limit[]=20" \
          -d "config.window_size[]=60" \
          -d "config.identifier=consumer" \
          -d "config.sync_rate=5" \
          -d "config.strategy=redis" \
          -d "config.redis_host=redis-node-1" \
          -d "config.redis_port=6379" \
          -d "config.redis_password=${REDIS_PASSWORD}"

        # Sentiment Service Rate Limiting
        curl -X POST http://kong-gateway:8001/services/sentiment-service/plugins \
          -d "name=rate-limiting-advanced" \
          -d "config.limit[]=50" \
          -d "config.window_size[]=60" \
          -d "config.identifier=consumer" \
          -d "config.sync_rate=5" \
          -d "config.strategy=redis" \
          -d "config.redis_host=redis-node-1" \
          -d "config.redis_port=6379" \
          -d "config.redis_password=${REDIS_PASSWORD}"

        # JWT Authentication for protected routes
        curl -X POST http://kong-gateway:8001/services/ai-matching-service/plugins \
          -d "name=jwt" \
          -d "config.secret_is_base64=false" \
          -d "config.key_claim_name=iss" \
          -d "config.claims_to_verify[]=exp"

        curl -X POST http://kong-gateway:8001/services/messaging-service/plugins \
          -d "name=jwt" \
          -d "config.secret_is_base64=false" \
          -d "config.key_claim_name=iss" \
          -d "config.claims_to_verify[]=exp"

        curl -X POST http://kong-gateway:8001/services/profile-service/plugins \
          -d "name=jwt" \
          -d "config.secret_is_base64=false" \
          -d "config.key_claim_name=iss" \
          -d "config.claims_to_verify[]=exp"

        # Request Transformer for Auth Service (add service context)
        curl -X POST http://kong-gateway:8001/services/auth-service/plugins \
          -d "name=request-transformer-advanced" \
          -d "config.add.headers[]=X-Service-Name:auth-service" \
          -d "config.add.headers[]=X-Service-Version:2.0.0"

        # Response Transformer for all services (add common headers)
        curl -X POST http://kong-gateway:8001/plugins \
          -d "name=response-transformer-advanced" \
          -d "config.add.headers[]=X-API-Version:v1.0" \
          -d "config.add.headers[]=X-Response-Time:\$(latency)" \
          -d "config.add.headers[]=X-Kong-Upstream-Latency:\$(upstream_response_time)" \
          -d "config.add.headers[]=X-Kong-Proxy-Latency:\$(kong_proxy_latency)"

        echo "Kong configuration completed successfully!"
    depends_on:
      kong-gateway:
        condition: service_healthy
    networks:
      - dinner-first-network
    restart: "no"

  # Kong Health Check Service
  kong-health:
    image: kong:3.4
    container_name: dinner-first-kong-health
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        while true; do
          echo "=== Kong Health Check ==="
          echo "Gateway Status:"
          curl -s http://kong-gateway:8001/status || echo "Gateway unreachable"

          echo "Services:"
          curl -s http://kong-gateway:8001/services | python3 -m json.tool || echo "Services check failed"

          echo "Routes:"
          curl -s http://kong-gateway:8001/routes | python3 -m json.tool || echo "Routes check failed"

          echo "Plugins:"
          curl -s http://kong-gateway:8001/plugins | python3 -m json.tool || echo "Plugins check failed"

          echo "=== End Health Check ==="
          sleep 60
        done
    depends_on:
      kong-gateway:
        condition: service_healthy
    networks:
      - dinner-first-network
    restart: unless-stopped

networks:
  dinner-first-network:
    external: true

volumes:
  kong_db_data:
    driver: local
  kong_data:
    driver: local
