# Redis Cluster Configuration File
# Optimized for high-performance microservices architecture

# Network and Connection Settings
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# Security
requirepass ${REDIS_PASSWORD}
masterauth ${REDIS_PASSWORD}

# Memory Management and Performance
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Database Separation Configuration
# DB 0: User Sessions & Authentication (512MB, LRU eviction, 15min TTL)
# DB 1: User Profile Cache (1GB, LFU eviction, 1hr TTL)
# DB 2: Matching Results Cache (1.5GB, Volatile TTL eviction, 30min TTL)
# DB 3: Real-time Analytics Stream (512MB, Volatile LRU eviction, 5min TTL)
# DB 4: Sentiment Analysis Cache (1GB, LRU eviction, 2hr TTL)
databases 16

# Persistence Configuration
save 900 1     # Save after 900 seconds if at least 1 key changed
save 300 10    # Save after 300 seconds if at least 10 keys changed
save 60 10000  # Save after 60 seconds if at least 10000 keys changed

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF Configuration (for durability)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Cluster Configuration
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-announce-ip ${CLUSTER_ANNOUNCE_IP}
cluster-announce-port ${CLUSTER_ANNOUNCE_PORT}
cluster-announce-bus-port ${CLUSTER_ANNOUNCE_BUS_PORT}
cluster-require-full-coverage no

# Performance Optimizations
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# Connection Pool Optimization
tcp-keepalive 300
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Logging
loglevel notice
logfile ""
syslog-enabled no

# Slow Query Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency Monitoring
latency-monitor-threshold 100

# Replication Settings
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600

# Memory usage optimization
activerehashing yes
hz 10
dynamic-hz yes

# Threat protection
protected-mode yes
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_b5b8e1c8a6d2f3e4a9c7d6f2e8a9b4c7"
