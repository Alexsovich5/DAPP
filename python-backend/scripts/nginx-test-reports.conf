# Nginx configuration for serving test reports
server {
    listen 80;
    server_name localhost;
    
    # Main landing page
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # Auto-generate index if not present
        location = / {
            return 301 /reports/;
        }
    }
    
    # Test reports
    location /reports/ {
        alias /usr/share/nginx/html/reports/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # Serve common report file types
        location ~* \.(html|xml|json|txt|log)$ {
            add_header Content-Type text/plain;
        }
        
        location ~* \.xml$ {
            add_header Content-Type application/xml;
        }
        
        location ~* \.json$ {
            add_header Content-Type application/json;
        }
    }
    
    # Coverage reports
    location /coverage/ {
        alias /usr/share/nginx/html/coverage/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # Serve HTML coverage reports
        try_files $uri $uri/ =404;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "Test reports server healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Disable caching for reports (they change frequently)
    location ~* \.(html|xml|json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}