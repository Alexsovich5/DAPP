[pytest]
# CI/CD specific pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# CI-optimized settings
addopts = 
    -v 
    --strict-markers
    --strict-config
    --cov=app 
    --cov-report=term-missing:skip-covered
    --cov-report=xml:coverage.xml
    --cov-report=html:htmlcov
    --cov-fail-under=50
    --tb=short
    --maxfail=10
    --durations=10
    --junit-xml=junit.xml

# Environment variables for CI
env =
    TESTING=1
    CI=1
    PYTHONPATH=.

# Parallel execution for CI
# Uncomment the following for parallel test execution
# addopts = ... -n auto

# Test markers for CI execution
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (requires database)
    performance: Performance and benchmark tests
    security: Security tests
    soul_connections: Soul connection feature tests
    revelations: Daily revelation feature tests
    photo_reveal: Photo reveal feature tests
    async_tests: Async/WebSocket tests
    load_tests: Load and concurrent testing
    websocket: WebSocket specific tests
    ai_services: AI service tests
    slow: Slow tests (run separately in CI)
    flaky: Flaky tests (may need retries)
    external: Tests requiring external services

# Warnings configuration for CI
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning
    error::pytest.PytestUnraisableExceptionWarning
    error::pytest.PytestAssertionRewriteWarning

# Test discovery patterns
norecursedirs = 
    .git 
    .github 
    dist 
    build 
    *.egg
    .pytest_cache
    .coverage
    htmlcov
    venv
    __pycache__

# Minimum required coverage for different modules
[coverage:run]
source = app
omit = 
    */tests/*
    */test_*
    */conftest.py
    */venv/*
    */__pycache__/*
    */migrations/*
    */alembic/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    @abstractmethod
    @abc.abstractmethod

# Coverage thresholds by module
fail_under = 50
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
title = Dinner First Backend Coverage Report

[coverage:xml]
output = coverage.xml