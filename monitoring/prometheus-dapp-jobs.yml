# monitoring/prometheus-dapp-jobs.yml
# Reference copy of the scrape jobs appended to
# /opt/monitoring/config/prometheus.yml during first-time demo setup.
# Source of truth lives in the host config — this file is for
# documentation and re-bootstrapping elsewhere.

  - job_name: 'dapp-backend'
    static_configs:
      - targets: ['dapp-backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'dapp-postgres-exporter'
    static_configs:
      - targets: ['dapp-postgres-exporter:9187']
    scrape_interval: 30s
